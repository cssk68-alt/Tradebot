<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tradebot – Einstellungen</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-nav { display: flex; gap: 4px; }
    .page-nav a {
      padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: var(--muted); transition: background .15s;
    }
    .page-nav a.active { background: #eef2ff; color: var(--accent); }
    .page-nav a:hover:not(.active) { background: var(--bg); color: var(--ink); }

    .server-warning {
      background: #fffbeb; border: 1px solid #fcd34d; border-radius: 12px;
      padding: 14px 18px; font-size: 13px; color: #92400e; line-height: 1.6;
    }

    .settings-grid { display: flex; flex-direction: column; gap: 16px; }

    .setting-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 20px 22px;
    }
    .setting-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px; gap: 12px;
    }
    .setting-label { font-weight: 700; font-size: 15px; padding-top: 2px; }
    .setting-value {
      font-size: 22px; font-weight: 700; color: var(--accent);
      white-space: nowrap; flex-shrink: 0;
    }

    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .slider-bound { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 3px; outline: none; cursor: pointer;
      background: linear-gradient(
        to right, var(--accent) var(--fill, 0%), #e6e8ee var(--fill, 0%)
      );
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: none;
    }

    .setting-desc { font-size: 13px; line-height: 1.7; color: #374151; margin-bottom: 12px; }
    .setting-desc p { margin: 0 0 5px; }
    .setting-desc p:last-child { margin-bottom: 0; }

    .setting-example {
      background: #f5f7ff; border: 1px solid #dde3ff; border-radius: 8px;
      padding: 10px 14px; font-size: 12.5px; color: #4b5563; line-height: 1.6;
    }
    .setting-example strong { color: var(--accent); }

    .save-bar {
      position: sticky; bottom: 0; background: #fff; border-top: 1px solid var(--line);
      padding: 14px 24px; display: flex; justify-content: flex-end;
      align-items: center; gap: 16px; z-index: 10;
    }
    .save-msg { font-size: 13px; color: var(--muted); }
    .save-msg.ok { color: var(--pos); font-weight: 600; }
    .save-msg.err { color: var(--neg); font-weight: 600; }
    .save-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px 28px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .save-btn:hover { background: #4338ca; }
    .save-btn:active { background: #3730a3; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▣</span>
      <h1>Tradebot</h1>
    </div>
    <nav class="page-nav">
      <a href="index.html">Dashboard</a>
      <a href="settings.html" class="active">Einstellungen</a>
    </nav>
  </header>

  <main>
    <div id="serverWarning" class="server-warning" style="display:none">
      ⚠️ <strong>Server nicht erreichbar.</strong>
      Starte zuerst <code>Start.bat</code> auf deinem Rechner, dann lade diese Seite neu
      (<code>http://localhost:8080/settings.html</code>).
      Über GitHub Pages können Einstellungen nur angezeigt, nicht gespeichert werden.
    </div>

    <div class="settings-grid" id="settingsGrid"></div>
  </main>

  <div class="save-bar">
    <span class="save-msg" id="saveMsg"></span>
    <button class="save-btn" onclick="saveConfig()">Speichern</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
