<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tradebot – Einstellungen</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-nav { display: flex; gap: 4px; }
    .page-nav a {
      padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: var(--muted); transition: background .15s;
    }
    .page-nav a.active { background: #eef2ff; color: var(--accent); }
    .page-nav a:hover:not(.active) { background: var(--bg); color: var(--ink); }

    .server-warning {
      background: #fffbeb; border: 1px solid #fcd34d; border-radius: 12px;
      padding: 14px 18px; font-size: 13px; color: #92400e; line-height: 1.6;
    }

    .preset-bar { margin-bottom: 18px; }
    .preset-intro { font-size: 13px; color: #4b5563; line-height: 1.6; margin-bottom: 10px; }
    .preset-intro strong { color: var(--ink); }
    .preset-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 640px) { .preset-btns { grid-template-columns: repeat(2, 1fr); } }
    .preset-btn {
      display: flex; flex-direction: column; gap: 2px; align-items: flex-start;
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 14px; cursor: pointer; text-align: left; transition: all .15s;
    }
    .preset-btn:hover { border-color: var(--accent); background: var(--bg); }
    .preset-btn.active {
      border-color: var(--accent); background: #eef2ff;
      box-shadow: 0 0 0 1px var(--accent) inset;
    }
    .preset-name { font-weight: 700; font-size: 14px; color: var(--ink); }
    .preset-btn.active .preset-name { color: var(--accent); }
    .preset-sub { font-size: 11.5px; color: var(--muted); }

    .settings-grid { display: flex; flex-direction: column; gap: 16px; }

    .setting-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 20px 22px;
    }
    .setting-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px; gap: 12px;
    }
    .setting-label { font-weight: 700; font-size: 15px; padding-top: 2px; }
    .setting-value {
      font-size: 22px; font-weight: 700; color: var(--accent);
      white-space: nowrap; flex-shrink: 0;
    }

    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .slider-bound { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 3px; outline: none; cursor: pointer;
      background: linear-gradient(
        to right, var(--accent) var(--fill, 0%), #e6e8ee var(--fill, 0%)
      );
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: none;
    }

    .setting-desc { font-size: 13px; line-height: 1.7; color: #374151; margin-bottom: 12px; }
    .setting-desc p { margin: 0 0 5px; }
    .setting-desc p:last-child { margin-bottom: 0; }

    .setting-example {
      background: #f5f7ff; border: 1px solid #dde3ff; border-radius: 8px;
      padding: 10px 14px; font-size: 12.5px; color: #4b5563; line-height: 1.6;
    }
    .setting-example strong { color: var(--accent); }

    /* ---- Circuit-Breaker Togglekarte ---- */
    .cb-card {
      border: 2px solid #fbbf24;   /* gelber Rahmen — hebt die Karte ab */
    }
    .cb-card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 6px; gap: 12px;
    }
    .cb-card-title { font-weight: 700; font-size: 15px; color: var(--ink); }
    .cb-card-sub   { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .cb-sliders { display: flex; flex-direction: column; gap: 20px; margin-top: 16px; }
    .cb-sliders.off { opacity: 0.32; pointer-events: none; }
    .cb-mini-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
    }
    .cb-mini-label { font-weight: 700; font-size: 14.5px; color: var(--ink); padding-top: 2px; }
    .cb-mini-value { font-size: 22px; font-weight: 700; color: var(--accent); white-space: nowrap; flex-shrink: 0; }

    /* Toggle-Schalter */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .toggle-lbl { font-size: 12.5px; font-weight: 700; color: #9ca3af; min-width: 22px; text-align: center; }
    .toggle-lbl.on { color: #16a34a; }
    .toggle { position: relative; display: inline-block; width: 46px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .tog-track {
      position: absolute; inset: 0; border-radius: 26px;
      background: #d1d5db; cursor: pointer; transition: background .2s;
    }
    .toggle input:checked + .tog-track { background: #16a34a; }
    .tog-track::before {
      content: ""; position: absolute; width: 20px; height: 20px;
      left: 3px; top: 3px; border-radius: 50%;
      background: white; transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .toggle input:checked + .tog-track::before { transform: translateX(20px); }

    .save-bar {
      position: sticky; bottom: 0; background: #fff; border-top: 1px solid var(--line);
      padding: 14px 24px; display: flex; justify-content: flex-end;
      align-items: center; gap: 16px; z-index: 10;
    }
    .save-msg { font-size: 13px; color: var(--muted); }
    .save-msg.ok { color: var(--pos); font-weight: 600; }
    .save-msg.err { color: var(--neg); font-weight: 600; }
    .save-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px 28px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .save-btn:hover { background: #4338ca; }
    .save-btn:active { background: #3730a3; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▣</span>
      <h1>Tradebot</h1>
    </div>
    <nav class="page-nav">
      <a href="index.html">Dashboard</a>
      <a href="settings.html" class="active">Einstellungen</a>
    </nav>
  </header>

  <main>
    <div id="serverWarning" class="server-warning" style="display:none">
      ⚠️ <strong>Server nicht erreichbar.</strong>
      Starte zuerst <code>Start.bat</code> auf deinem Rechner, dann lade diese Seite neu
      (<code>http://localhost:8080/settings.html</code>).
      Über GitHub Pages können Einstellungen nur angezeigt, nicht gespeichert werden.
    </div>

    <div class="preset-bar" id="presetBar"></div>

    <div class="settings-grid" id="settingsGrid"></div>
  </main>

  <div class="save-bar">
    <span class="save-msg" id="saveMsg"></span>
    <button class="save-btn" onclick="saveConfig()">Speichern</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
